<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alcorão em Português</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

<nav class="navbar navbar-dark">
  <div class="container d-flex justify-content-between align-items-center">
    <a class="navbar-brand">☪ Alcorão</a>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-light btn-sm" onclick="mostrarFavoritos()">❤️ Favoritos</button>
      <button class="btn btn-light btn-sm" onclick="toggleTheme()" id="themeBtn">🌙</button>
    </div>
  </div>
</nav>

<section class="hero text-center text-white">
  <div class="container">
    <div class="arabic-hero">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
    <h1 class="mt-3">Alcorão em Português</h1>
    <p class="lead">114 suratas · Árabe e Português · Áudio</p>
    <input id="searchInput" class="form-control mt-4 search-input"
           placeholder="🔍 Pesquisar surata por nome ou número...">
  </div>
</section>

<div class="container my-5">
  <div id="favAlert" class="alert alert-warning d-none" role="alert">
    ❤️ A mostrar os seus favoritos. <a href="#" onclick="mostrarTodos()">Ver todos</a>
  </div>
  <div class="row g-3" id="listaSuratas"></div>
</div>

<script src="js/app.js"></script>
</body>
</html>
